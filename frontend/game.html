<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game — AI Dart Scorer</title>
    <link rel="stylesheet" href="/static/css/common.css" />
    <link rel="stylesheet" href="/static/css/game.css" />
    <link rel="icon" href="/static/icons/favicon.svg" />
    <script src="/static/js/game.js" type="module"></script>
  </head>

  <body>
    <header class="topbar">
      <a href="/" class="back-btn" aria-label="Back">
        <object data="/static/icons/chevron-left.svg" type="image/svg+xml"></object>
      </a>
      <h1 id="game-title">X01</h1>
    </header>

    <main>
      <!-- Player scoreboard -->
      <section class="scoreboard" id="scoreboard"></section>

      <!-- Dartboard reference with dart markers -->
      <section class="board-section">
        <div class="board-wrap">
          <img src="/static/assets/reference.png" alt="Dartboard" class="board-img" />
          <canvas id="board-canvas" class="board-canvas"></canvas>
        </div>
      </section>

      <!-- Sidebar: turn + status + actions -->
      <div class="sidebar">
        <section class="turn-panel">
          <div class="turn-darts" id="turn-darts">
            <div class="dart-slot" id="dart-1">—</div>
            <div class="dart-slot" id="dart-2">—</div>
            <div class="dart-slot" id="dart-3">—</div>
          </div>
          <div class="turn-total">
            <span>Turn:</span>
            <span id="turn-total">0</span>
          </div>
        </section>

        <section class="status-panel">
          <p class="status-text" id="status-text">Throw your darts...</p>
          <div class="action-row">
            <button class="action-btn" id="btn-miss">Miss</button>
            <button class="action-btn action-btn-primary" id="btn-next" disabled>Next Player</button>
          </div>
        </section>

        <section class="history-section" id="history"></section>
      </div>
      <!-- Clear board modal -->
      <div class="clear-overlay" id="clear-overlay" hidden>
        <div class="clear-content">
          <div class="clear-spinner"></div>
          <p>Remove darts from board to start</p>
        </div>
      </div>

      <!-- Win overlay -->
      <div class="win-overlay" id="win-overlay" hidden>
        <div class="win-content">
          <h2 id="win-message">Player 1 wins!</h2>
          <button class="action-btn action-btn-primary" id="btn-restart">New Game</button>
        </div>
      </div>
    </main>
  </body>
</html>
